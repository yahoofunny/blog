<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @keyframes breathe { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.92)} }
      @keyframes clawL { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(8deg)} }
      @keyframes clawR { 0%,100%{transform:rotate(5deg)} 50%{transform:rotate(-8deg)} }
      @keyframes eyes { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1px)} }
      @keyframes walkL1 { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(10deg)} }
      @keyframes walkR1 { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-10deg)} }
      .body { fill:url(#bodyGrad); stroke:#C0392B; stroke-width:1.5 }
      .claw { fill:url(#clawGrad); stroke:#A93226; stroke-width:1 }
      .eye { fill:#1a1a1a }
      .cheek { fill:#F5B7B1; opacity:0.6 }
      .leg { fill:none; stroke:#C0392B; stroke-width:1.5; stroke-linecap:round }
    </style>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E74C3C"/><stop offset="100%" stop-color="#C0392B"/></linearGradient>
    <linearGradient id="clawGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EC7063"/><stop offset="100%" stop-color="#E74C3C"/></linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="50" cy="88" rx="22" ry="3" fill="rgba(0,0,0,0.15)"/>
  <!-- Legs left -->
  <g style="transform-origin:35px 70px;animation:walkL1 0.6s infinite ease-in-out">
    <line x1="36" y1="70" x2="22" y2="84" class="leg"/>
    <line x1="40" y1="72" x2="26" y2="86" class="leg"/>
    <line x1="42" y1="71" x2="38" y2="85" class="leg"/>
  </g>
  <!-- Legs right -->
  <g style="transform-origin:65px 70px;animation:walkR1 0.6s 0.3s infinite ease-in-out">
    <line x1="64" y1="70" x2="78" y2="84" class="leg"/>
    <line x1="60" y1="72" x2="74" y2="86" class="leg"/>
    <line x1="58" y1="71" x2="62" y2="85" class="leg"/>
  </g>
  <!-- Body breathe -->
  <g style="transform-origin:50px 70px;animation:breathe 2s infinite ease-in-out">
    <!-- Main body -->
    <ellipse cx="50" cy="60" rx="20" ry="16" class="body"/>
    <!-- Belly -->
    <ellipse cx="50" cy="63" rx="13" ry="10" fill="#EC7063" opacity="0.4"/>
    <!-- Cheeks -->
    <ellipse cx="36" cy="58" rx="5" ry="3.5" class="cheek"/>
    <ellipse cx="64" cy="58" rx="5" ry="3.5" class="cheek"/>
    <!-- Eyes -->
    <g style="animation:eyes 3s infinite ease-in-out">
      <ellipse cx="43" cy="52" rx="4" ry="5" class="eye"/>
      <ellipse cx="57" cy="52" rx="4" ry="5" class="eye"/>
      <!-- Eye highlights -->
      <circle cx="44" cy="50" r="1.5" fill="#fff"/>
      <circle cx="58" cy="50" r="1.5" fill="#fff"/>
    </g>
    <!-- Mouth (smile) -->
    <path d="M45 62 Q50 67 55 62" fill="none" stroke="#922B21" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Left claw -->
  <g style="transform-origin:18px 55px;animation:clawL 2s infinite ease-in-out">
    <path d="M18 55 Q8 42 6 35 Q4 28 10 30 Q14 32 12 38" class="claw"/>
    <!-- Pincer -->
    <path d="M6 35 Q0 30 3 27" fill="none" stroke="#A93226" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M8 33 Q15 28 12 24" fill="none" stroke="#A93226" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Right claw -->
  <g style="transform-origin:82px 55px;animation:clawR 2s infinite ease-in-out">
    <path d="M82 55 Q92 42 94 35 Q96 28 90 30 Q86 32 88 38" class="claw"/>
    <!-- Pincer -->
    <path d="M94 35 Q100 30 97 27" fill="none" stroke="#A93226" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M92 33 Q85 28 88 24" fill="none" stroke="#A93226" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
